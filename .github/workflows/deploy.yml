name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI: Kiểm tra syntax PHP ────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            | sort \
            | xargs -I{} php -l {}

  # ─── CD: Deploy lên Termux qua Tailscale SSH ────────────────────────
  deploy:
    name: Deploy to Termux
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Connect runner to Tailscale network
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH (Tailscale)
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          set -e

          cd ${{ secrets.APP_PATH }}
          git fetch origin main
          git reset --hard origin/main
          echo "✓ Code updated"

          rm -f thumbnails/_list_cache.json
          echo "✓ Cache cleared"

          pkill -f 'php.*-S 0.0.0.0:8080' || true
          sleep 1
          PHP_CLI_SERVER_WORKERS=4 nohup php \
            -d upload_max_filesize=10000M \
            -d post_max_size=10000M \
            -d memory_limit=512M \
            -S 0.0.0.0:8080 \
            -t ${{ secrets.APP_PATH }} \
            >> ~/server.log 2>&1 &

          sleep 2
          echo "✓ Server restarted with 4 workers"
          ENDSSH
