name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI: Kiểm tra syntax PHP ────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            | sort \
            | xargs -I{} php -l {}

  # ─── CD: Deploy lên Termux qua Cloudflare Tunnel + Service Token ─────
  deploy:
    name: Deploy to Termux
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo tee /usr/share/keyrings/cloudflare-main.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
            https://pkg.cloudflare.com/cloudflared any main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -qq && sudo apt-get install -y cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Fetch Cloudflare Access token (service token auth)
        env:
          CF_Access_Client_Id: ${{ secrets.CF_CLIENT_ID }}
          CF_Access_Client_Secret: ${{ secrets.CF_CLIENT_SECRET }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Fetches a JWT using the service token and caches it locally.
          # cloudflared access ssh will pick it up automatically.
          cloudflared access token --app=https://${SSH_HOST}

      - name: Deploy via cloudflared SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_PATH: ${{ secrets.APP_PATH }}
          CF_Access_Client_Id: ${{ secrets.CF_CLIENT_ID }}
          CF_Access_Client_Secret: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o "ProxyCommand=cloudflared access ssh --hostname ${SSH_HOST}" \
            ${SSH_USER}@${SSH_HOST} << 'ENDSSH'
          set -e

          cd "$APP_PATH"
          git fetch origin main
          git reset --hard origin/main
          echo "✓ Code updated"

          rm -f thumbnails/_list_cache.json
          echo "✓ Cache cleared"

          pkill -f 'php.*-S 0.0.0.0:8080' || true
          sleep 1
          PHP_CLI_SERVER_WORKERS=4 nohup php \
            -d upload_max_filesize=10000M \
            -d post_max_size=10000M \
            -d memory_limit=512M \
            -S 0.0.0.0:8080 \
            -t "$APP_PATH" \
            >> ~/server.log 2>&1 &

          sleep 2
          echo "✓ Server restarted with 4 workers"
          ENDSSH
